services:
  - type: web
    name: notused
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_CLOUD_QUOTA_PROJECT
        value: calm-mariner-105612
      - key: CORS_ORIGINS
        value: "*"
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
