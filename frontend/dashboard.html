<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>notused — dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="header-left">
      <span class="header-logo">notused</span>
      <span class="header-facility" id="header-facility"></span>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <span id="header-date" style="font-family:var(--mono);font-size:12px;color:var(--muted);"></span>
      <button class="btn-ghost" onclick="logout()">Sair</button>
    </div>
  </header>

  <!-- Main -->
  <main class="main-content">

    <!-- Stats bar -->
    <div class="stats-bar" id="stats-bar">
      <div class="stat-card">
        <div class="stat-label">Total escalados</div>
        <div class="stat-value accent" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Confirmados</div>
        <div class="stat-value green" id="stat-confirmados">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pendentes</div>
        <div class="stat-value" id="stat-pendentes">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Cancelados</div>
        <div class="stat-value red" id="stat-cancelados">—</div>
      </div>
      <div class="stat-card hide-mobile">
        <div class="stat-label">Rotas planejadas</div>
        <div class="stat-value" id="stat-rotas">—</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <button class="filter-tab active" data-filter="todos" onclick="setFilter('todos', this)">Todos</button>
      <button class="filter-tab" data-filter="pendentes" onclick="setFilter('pendentes', this)">Pendentes</button>
      <button class="filter-tab" data-filter="confirmados" onclick="setFilter('confirmados', this)">Confirmados</button>
      <button class="filter-tab" data-filter="cancelados" onclick="setFilter('cancelados', this)">Cancelados</button>
      <div class="filter-spacer"></div>
      <input class="search-input" id="search-input" placeholder="buscar driver ID..." oninput="applyFilters()" />
      <button class="btn-refresh" id="btn-refresh" onclick="loadDrivers()">
        <span id="refresh-icon">↺</span> Atualizar
      </button>
    </div>

    <!-- Table -->
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Driver ID</th>
            <th>Veículo</th>
            <th class="hide-mobile">Tipo</th>
            <th class="hide-mobile">Categoria</th>
            <th>Chegada prevista</th>
            <th class="hide-mobile">Data ETA</th>
            <th>Status</th>
            <th class="hide-mobile">SVC</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <!-- preenchido via JS -->
        </tbody>
      </table>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
