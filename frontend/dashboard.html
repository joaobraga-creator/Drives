<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Driver Check — Mercado Livre</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header class="app-header">
    <div class="header-brand">
      <img class="header-logo"
           src="https://http2.mlstatic.com/frontend-assets/ui-navigation/5.18.9/mercadolibre/logo__small@2x.png"
           alt="Mercado Livre" />
      <span class="header-app-name">Driver Check</span>
      <span class="header-facility-tag" id="header-facility">—</span>
    </div>
    <button class="btn-logout" onclick="logout()">
      <i class="fas fa-sign-out-alt"></i> Sair
    </button>
  </header>

  <!-- ── Stats strip ── -->
  <div class="stats-strip">
    <div class="stat-pill" data-filter="todos" onclick="setFilter('todos', this)">
      <span class="stat-num" id="stat-total">—</span>
      <span class="stat-lbl">Total</span>
    </div>
    <div class="stat-pill green" data-filter="arrived" onclick="setFilter('arrived', this)">
      <span class="stat-num" id="stat-arrived">—</span>
      <span class="stat-lbl">Chegaram</span>
    </div>
    <div class="stat-pill blue" data-filter="pendentes" onclick="setFilter('pendentes', this)">
      <span class="stat-num" id="stat-pendentes">—</span>
      <span class="stat-lbl">Pendentes</span>
    </div>
    <div class="stat-pill red" data-filter="nao-chegou" onclick="setFilter('nao-chegou', this)">
      <span class="stat-num" id="stat-nao-chegou">—</span>
      <span class="stat-lbl">Ausentes</span>
    </div>
  </div>

  <!-- ── Toolbar ── -->
  <div class="toolbar">
    <input
      class="search-input"
      id="search-input"
      type="search"
      placeholder="Buscar driver ID..."
      oninput="applyFilters()"
      autocomplete="off"
    />
    <button class="btn-qr" id="btn-qr" onclick="openQR()" title="Escanear QR code">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <path d="M14 14h2v2h-2zM18 14h3v3h-3zM14 18h2v3h-2zM18 19h3v2h-3z"/>
      </svg>
    </button>
    <button class="btn-refresh" id="btn-refresh" onclick="loadDrivers()" title="Atualizar">
      <span id="refresh-icon">↺</span>
    </button>
  </div>

  <!-- ── Filter tabs ── -->
  <div class="filter-tabs">
    <button class="tab active" onclick="setFilter('todos', this)"><i class="fas fa-list"></i> Todos</button>
    <button class="tab" onclick="setFilter('pendentes', this)"><i class="fas fa-clock"></i> Pendentes</button>
    <button class="tab" onclick="setFilter('arrived', this)"><i class="fas fa-check-circle"></i> Chegaram</button>
    <button class="tab" onclick="setFilter('nao-chegou', this)"><i class="fas fa-times-circle"></i> Ausentes</button>
  </div>

  <!-- ── Cards ── -->
  <main class="cards-container" id="cards-container"></main>

  <!-- ── QR Overlay ── -->
  <div class="qr-overlay" id="qr-overlay" role="dialog" aria-modal="true" aria-label="Leitor de QR code">
    <div class="qr-topbar">
      <span>Escanear QR do Driver</span>
      <button class="btn-qr-close" onclick="closeQR()" aria-label="Fechar">&#x2715;</button>
    </div>
    <div id="qr-reader"></div>
    <p class="qr-hint">Aponte a camera para o QR code do driver</p>
  </div>

  <!-- ── Driver modal (bottom sheet after QR scan) ── -->
  <div class="driver-modal" id="driver-modal" role="dialog" aria-modal="true">
    <div class="modal-backdrop" id="modal-backdrop" onclick="closeModal()"></div>
    <div class="modal-sheet" id="modal-sheet">
      <div class="modal-handle"></div>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
